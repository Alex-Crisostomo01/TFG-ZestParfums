spring.application.name=BackendTFG

# ==========================================
# 1. CONFIGURACIÓN DE LA CONEXIÓN A MySQL
# ==========================================
# En local usábamos localhost:3306 con usuario root y password 1234.
# Ahora leemos estos valores de variables de entorno de Railway,
# para no exponer credenciales reales en el código fuente.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# ==========================================
# 2. CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
# 'update' hace que Spring cree o actualice las tablas automáticamente
# si no existen o han cambiado, sin borrar los datos existentes.
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola las consultas SQL que ejecuta Spring (útil para depurar)
spring.jpa.show-sql=true

# Dialecto necesario para que Hibernate genere SQL compatible con MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# 3. CONFIGURACIÓN JWT
# ==========================================
# Clave secreta para firmar y verificar los tokens JWT.
# Se lee de variable de entorno para no dejarla expuesta en el repositorio.
jwt.secret=${JWT_SECRET}

# Tiempo de expiración del token en milisegundos (86400000 = 24 horas)
jwt.expiration=86400000
